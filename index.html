<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças & Processos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#F5F3EE;--surface:#FFF;--surface2:#EDEBE6;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1A1916;--muted:#7A7870;--hint:#B0AEA8;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-t:#0F6E56;
  --red:#D85A30;--red-bg:#FAECE7;--red-t:#993C1D;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-t:#854F0B;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --purple:#534AB7;--purple-bg:#EDEAFB;--purple-t:#3A3190;
  --accent:#3C3489;--r:10px;--rl:16px;
}
[data-theme=dark]{
  --bg:#131211;--surface:#1E1D1A;--surface2:#272520;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#F0EDE8;--muted:#9A9890;--hint:#5A5856;
  --green-bg:#082E22;--green-t:#5DCAA5;
  --red-bg:#2E1208;--red-t:#F0997B;
  --amber-bg:#2E1E00;--amber-t:#FAC775;
  --blue-bg:#081828;--blue-t:#85B7EB;
  --purple-bg:#1A1840;--purple-t:#9B96E8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;transition:background .2s,color .2s;}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2.5rem;width:100%;max-width:400px;}
.auth-logo{font-family:'DM Serif Display',serif;font-size:32px;margin-bottom:.25rem;}
.auth-logo span{color:var(--accent);}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:2rem;}
.auth-tabs{display:flex;margin-bottom:1.5rem;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;}
.auth-tab{flex:1;padding:8px;font-size:13px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;}
.auth-tab.on{background:var(--accent);color:#fff;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;}
.field input:focus{border-color:var(--accent);}
.btn-full{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;margin-top:.5rem;}
.auth-msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:1rem;display:none;}
.auth-msg.ok{background:var(--green-bg);color:var(--green-t);}
.auth-msg.err{background:var(--red-bg);color:var(--red-t);}
#app-screen{display:none;grid-template-columns:230px 1fr;min-height:100vh;}
#app-screen.visible{display:grid;}
@media(max-width:750px){#app-screen.visible{grid-template-columns:1fr;}.sidebar{display:none;}.mob-bar{display:flex !important;}}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:2rem 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.logo{padding:0 1.5rem 2rem;font-family:'DM Serif Display',serif;font-size:22px;}
.logo span{color:var(--accent);}
.nav-s{font-size:11px;font-weight:500;letter-spacing:.08em;color:var(--hint);padding:1.25rem 1.5rem .4rem;text-transform:uppercase;}
.ni{display:flex;align-items:center;gap:10px;padding:9px 1.5rem;font-size:14px;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:all .15s;user-select:none;}
.ni:hover{color:var(--text);background:var(--surface2);}
.ni.on{color:var(--accent);border-left-color:var(--accent);background:var(--blue-bg);}
.ni svg{width:17px;height:17px;flex-shrink:0;}
.sidebar-foot{margin-top:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:8px;}
.user-chip{display:flex;align-items:center;gap:8px;padding:8px;background:var(--surface2);border-radius:8px;}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;}
.user-email{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;width:100%;justify-content:center;}
.icon-btn:hover{background:var(--surface2);color:var(--text);}
.mob-bar{display:none;align-items:center;justify-content:space-between;padding:1rem 1.25rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.mob-logo{font-family:'DM Serif Display',serif;font-size:18px;}
.hbg{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px;cursor:pointer;color:var(--text);}
.main{padding:2rem;overflow-y:auto;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px;}
.pt{font-family:'DM Serif Display',serif;font-size:28px;}
.ps{font-size:14px;color:var(--muted);margin-top:2px;}
.mnav{display:flex;align-items:center;gap:8px;}
.mnav button{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text);font-size:13px;}
.mnav button:hover{background:var(--surface2);}
.mlbl{font-size:15px;font-weight:500;min-width:90px;text-align:center;}
.mets{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:2rem;}
.met{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;}
.ml{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}
.mv{font-family:'DM Serif Display',serif;font-size:26px;}
.ms{font-size:12px;color:var(--muted);margin-top:4px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;}
.ct{font-size:14px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--hint);padding:0 8px 8px;text-align:left;}
.tbl td{padding:10px 8px;border-top:1px solid var(--border);font-size:14px;color:var(--text);}
.tbl tr:first-child td{border-top:none;}
.tbl tr:hover td{background:var(--surface2);}
.num{text-align:right;font-variant-numeric:tabular-nums;}
input[type=text],input[type=number],input[type=date],input[type=password],input[type=url],textarea,select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--surface);color:var(--text);}
textarea{resize:vertical;min-height:70px;}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border2);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);transition:all .1s;}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{opacity:.9;}
.btn-ghost{border:none;background:none;color:var(--muted);padding:4px;cursor:pointer;display:flex;align-items:center;}
.btn-ghost:hover{color:var(--red);}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--accent);color:#fff;border:none;border-radius:50px;padding:12px 22px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(83,74,183,.3);display:flex;align-items:center;gap:8px;z-index:20;transition:all .2s;}
.fab:hover{transform:translateY(-1px);}
.fab:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.bg{background:var(--green-bg);color:var(--green-t);}
.br{background:var(--red-bg);color:var(--red-t);}
.ba{background:var(--amber-bg);color:var(--amber-t);}
.bb{background:var(--blue-bg);color:var(--blue-t);}
.bp{background:var(--purple-bg);color:var(--purple-t);}
.bgr{background:var(--surface2);color:var(--muted);}
.prog{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:5px;}
.pf{height:100%;border-radius:3px;}
.sbar{height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;margin:8px 0;}
.sf{height:100%;border-radius:5px;}
.frow-fix{display:grid;grid-template-columns:1fr 110px 130px 65px 34px;gap:8px;align-items:center;margin-bottom:5px;}
.frow-parc{display:grid;grid-template-columns:1fr 110px 85px 65px 34px;gap:8px;align-items:center;margin-bottom:5px;}
.frow-rec{display:grid;grid-template-columns:1fr 110px 130px 34px;gap:8px;align-items:center;margin-bottom:5px;}
.fhead{display:grid;gap:8px;margin-bottom:6px;}
.fhead span{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--hint);}
.fh-fix{grid-template-columns:1fr 110px 130px 65px 34px;}
.fh-parc{grid-template-columns:1fr 110px 85px 65px 34px;}
.fh-rec{grid-template-columns:1fr 110px 130px 34px;}
@media(max-width:600px){.frow-fix,.frow-parc,.frow-rec{grid-template-columns:1fr 100px 32px;}.hcat,.hvenc,.hpn,.hpt,.htipo{display:none;}.fhead{display:none;}}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.g2{grid-template-columns:1fr;}}
.vlist{display:flex;flex-wrap:wrap;gap:8px;}
.vchip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
.vchip.urg{border-color:var(--red);background:var(--red-bg);}
.vd{font-size:11px;color:var(--muted);}
.vn{font-size:13px;font-weight:500;}
.vv{font-size:12px;color:var(--muted);}
.vchip.urg .vd,.vchip.urg .vv{color:var(--red-t);}
.vchip.urg .vn{color:var(--red-t);}
.alert-a{background:var(--amber-bg);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:var(--amber-t);margin-bottom:10px;}
.alert-r{background:var(--red-bg);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:var(--red-t);margin-bottom:10px;}

/* Processo cards */
.proc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.proc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;transition:box-shadow .15s;}
.proc-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.07);}
.proc-card.urgente{border-left:3px solid var(--red);}
.proc-card.atencao{border-left:3px solid var(--amber);}
.proc-card.encerrado{border-left:3px solid var(--green);opacity:.8;}
.proc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem;gap:8px;}
.proc-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:500;word-break:break-all;}
.proc-actions{display:flex;gap:2px;flex-shrink:0;}
.proc-titulo{font-size:14px;font-weight:500;margin-bottom:.5rem;}
.proc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.75rem;}
.proc-info{margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pf-item{font-size:12px;}
.pf-item .lbl{color:var(--muted);display:block;margin-bottom:1px;font-size:11px;}
.pf-item .val{font-size:13px;font-weight:500;word-break:break-all;}
.proc-notif{margin-top:.75rem;padding:.6rem .75rem;background:var(--surface2);border-radius:8px;}
.notif-lbl{font-size:11px;color:var(--muted);margin-bottom:2px;}
.notif-txt{font-size:13px;color:var(--text);}
.proc-obs{margin-top:.5rem;font-size:12px;color:var(--muted);font-style:italic;}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--surface);border-radius:var(--rl);padding:2rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;position:relative;}
.modal h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:1.5rem;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:500px){.mgrid{grid-template-columns:1fr;}}
.mf{margin-bottom:0;}
.mf label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px;}
.mf.full{grid-column:1/-1;}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;}
.modal-close:hover{color:var(--text);}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);}
.pass-wrap{position:relative;}
.pass-wrap input{padding-right:34px;}
.pass-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:2px;display:flex;}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;transition:opacity .3s;}
#loading.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-family:'DM Serif Display',serif;font-size:36px;}
.loading-logo span{color:var(--accent);}
.drawer{position:fixed;inset:0;z-index:100;display:none;}
.drawer.open{display:block;}
.dov{position:absolute;inset:0;background:rgba(0,0,0,.4);}
.dpanel{position:absolute;left:0;top:0;bottom:0;width:260px;background:var(--surface);padding:2rem 0;display:flex;flex-direction:column;overflow-y:auto;}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty svg{width:48px;height:48px;opacity:.3;margin-bottom:1rem;}
.empty p{font-size:14px;}
</style>
</head>
<body>

<div id="loading"><div class="loading-logo">fin<span>.</span></div></div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">fin<span>.</span></div>
    <div class="auth-sub">Finanças &amp; Processos</div>
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="authTab('login')">Entrar</button>
      <button class="auth-tab" onclick="authTab('signup')">Criar conta</button>
    </div>
    <div class="field"><label>E-mail</label><input type="text" id="ae" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')authSubmit()"></div>
    <div class="field"><label>Senha</label><input type="password" id="ap" placeholder="••••••••" onkeydown="if(event.key==='Enter')authSubmit()"></div>
    <div id="anf" class="field" style="display:none"><label>Nome</label><input type="text" id="an" placeholder="Seu nome"></div>
    <button class="btn-full" id="ab" onclick="authSubmit()">Entrar</button>
    <div class="auth-msg" id="am"></div>
  </div>
</div>

<div id="app-screen">
  <aside class="sidebar">
    <div class="logo">fin<span>.</span></div>
    <span class="nav-s">Finanças</span>
    <div class="ni on" data-p="resumo" onclick="navTo('resumo')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Resumo</div>
    <div class="ni" data-p="receitas" onclick="navTo('receitas')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Receitas</div>
    <div class="ni" data-p="fixas" onclick="navTo('fixas')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Contas fixas</div>
    <div class="ni" data-p="variaveis" onclick="navTo('variaveis')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>Variáveis</div>
    <div class="ni" data-p="parcelas" onclick="navTo('parcelas')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>Parcelas</div>
    <span class="nav-s">Jurídico</span>
    <div class="ni" data-p="processos" onclick="navTo('processos')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Processos</div>
    <div class="sidebar-foot">
      <div class="user-chip"><div class="user-av" id="uav">?</div><div class="user-email" id="ue">—</div></div>
      <button class="icon-btn" onclick="toggleTheme()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span id="tlbl">Tema escuro</span></button>
      <button class="icon-btn" onclick="logout()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sair</button>
    </div>
  </aside>
  <div style="display:flex;flex-direction:column;min-height:100vh;overflow:hidden;">
    <div class="mob-bar">
      <div class="mob-logo">fin<span style="color:var(--accent)">.</span></div>
      <div style="display:flex;gap:8px;align-items:center;"><span id="mm" style="font-size:13px;color:var(--muted)"></span><button class="hbg" onclick="openDrawer()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button></div>
    </div>
    <div class="main" id="main">
      <div id="pg-resumo"></div>
      <div id="pg-receitas" style="display:none"></div>
      <div id="pg-fixas" style="display:none"></div>
      <div id="pg-variaveis" style="display:none"></div>
      <div id="pg-parcelas" style="display:none"></div>
      <div id="pg-processos" style="display:none"></div>
    </div>
  </div>
</div>

<div class="drawer" id="drawer">
  <div class="dov" onclick="closeDrawer()"></div>
  <div class="dpanel">
    <div class="logo" style="padding:0 1.5rem 1.5rem;">fin<span style="color:var(--accent)">.</span></div>
    <span class="nav-s">Finanças</span>
    <div class="ni" onclick="navTo('resumo');closeDrawer()">Resumo</div>
    <div class="ni" onclick="navTo('receitas');closeDrawer()">Receitas</div>
    <div class="ni" onclick="navTo('fixas');closeDrawer()">Contas fixas</div>
    <div class="ni" onclick="navTo('variaveis');closeDrawer()">Variáveis</div>
    <div class="ni" onclick="navTo('parcelas');closeDrawer()">Parcelas</div>
    <span class="nav-s">Jurídico</span>
    <div class="ni" onclick="navTo('processos');closeDrawer()">Processos</div>
    <div style="padding:1rem 1.5rem;margin-top:auto;"><button class="icon-btn" onclick="logout()" style="width:100%">Sair</button></div>
  </div>
</div>

<!-- Modal processo -->
<div class="modal-ov" id="mproc" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <h2 id="mtitle">Novo processo</h2>
    <div class="mgrid">
      <div class="mf"><label>Número do processo *</label><input type="text" id="pn" placeholder="0000000-00.0000.0.00.0000"></div>
      <div class="mf"><label>Tipo / Vara</label><input type="text" id="pt" placeholder="Ex: Trabalhista — 3ª Vara"></div>
      <div class="mf full"><label>Título / Descrição</label><input type="text" id="pti" placeholder="Ex: Ação de cobrança contra Empresa X"></div>
      <div class="mf"><label>Parte contrária</label><input type="text" id="ppa" placeholder="Nome da outra parte"></div>
      <div class="mf"><label>Advogado responsável</label><input type="text" id="padv" placeholder="Nome do advogado"></div>
      <div class="mf"><label>Status</label><select id="pst"><option>Em andamento</option><option>Aguardando audiência</option><option>Aguardando sentença</option><option>Recurso pendente</option><option>Encerrado — favorável</option><option>Encerrado — desfavorável</option><option>Suspenso</option></select></div>
      <div class="mf"><label>Fase atual</label><select id="pfa"><option>Inicial / Citação</option><option>Instrução</option><option>Audiência</option><option>Sentença</option><option>Recurso</option><option>Execução</option><option>Encerrado</option></select></div>
      <div class="mf full"><label>Portal / URL de acesso</label><input type="url" id="ppo" placeholder="https://esaj.tjsp.jus.br/..."></div>
      <div class="mf"><label>Login de acesso</label><input type="text" id="plo" placeholder="CPF, OAB ou e-mail"></div>
      <div class="mf"><label>Senha de acesso</label><div class="pass-wrap"><input type="password" id="pse" placeholder="••••••••"><button class="pass-eye" onclick="togglePass()" type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeic"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
      <div class="mf"><label>Data da última notificação</label><input type="date" id="pun"></div>
      <div class="mf"><label>Próxima audiência / prazo</label><input type="date" id="ppr"></div>
      <div class="mf"><label>Valor envolvido (R$)</label><input type="number" id="pva" placeholder="0,00"></div>
      <div class="mf full"><label>Última movimentação</label><textarea id="pmo" placeholder="Descreva a última movimentação recebida..."></textarea></div>
      <div class="mf full"><label>Observações internas</label><textarea id="pob" placeholder="Notas, estratégia, documentos pendentes..."></textarea></div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarProcesso()">Salvar processo</button>
    </div>
  </div>
</div>

<button class="fab" id="fab" onclick="fabAction()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
  <span id="flbl">Salvar mês</span>
</button>

<script>
const SUPABASE_URL='COLE_SUA_URL_AQUI';
const SUPABASE_KEY='COLE_SUA_ANON_KEY_AQUI';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const MN=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const CATS=['Moradia','Veículos','Saúde','Educação','Alimentação','Lazer','Impostos','Cartões','Outros'];
const TREC=['Salário','Freelance','Aluguel recebido','Reembolso','Outros'];
const CC={Moradia:'#378ADD',Veículos:'#534AB7',Saúde:'#1D9E75',Educação:'#3B6D11',Alimentação:'#BA7517',Lazer:'#D4537E',Impostos:'#E24B4A',Cartões:'#D85A30',Outros:'#888780'};
const SBM={'Em andamento':'bb','Aguardando audiência':'ba','Aguardando sentença':'ba','Recurso pendente':'br','Encerrado — favorável':'bg','Encerrado — desfavorável':'br','Suspenso':'bgr'};

let dark=localStorage.getItem('fin_theme')==='dark';
if(dark)document.documentElement.setAttribute('data-theme','dark');
function toggleTheme(){dark=!dark;document.documentElement.setAttribute('data-theme',dark?'dark':'');localStorage.setItem('fin_theme',dark?'dark':'');document.getElementById('tlbl').textContent=dark?'Tema claro':'Tema escuro';}
if(dark)document.getElementById('tlbl').textContent='Tema claro';

let USER=null,hoje=new Date(),MA={y:hoje.getFullYear(),m:hoje.getMonth()},D={fixas:[],variaveis:[],parcelas:[],receitas:[],areceber:[]},PROCS=[],CP='resumo',saving=false,editId=null;

// Auth
let AM='login';
function authTab(m){AM=m;document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('on',(i===0&&m==='login')||(i===1&&m==='signup')));document.getElementById('ab').textContent=m==='login'?'Entrar':'Criar conta';document.getElementById('anf').style.display=m==='signup'?'block':'none';showMsg('','');}
function showMsg(t,type){const e=document.getElementById('am');e.textContent=t;e.className='auth-msg'+(t?' '+type:'');e.style.display=t?'block':'none';}
async function authSubmit(){
  const email=document.getElementById('ae').value.trim(),pass=document.getElementById('ap').value,btn=document.getElementById('ab');
  if(!email||!pass){showMsg('Preencha e-mail e senha.','err');return;}
  btn.innerHTML='<span class="spin"></span>';btn.disabled=true;
  if(AM==='login'){const{error}=await sb.auth.signInWithPassword({email,password:pass});if(error){showMsg('E-mail ou senha incorretos.','err');btn.textContent='Entrar';btn.disabled=false;}}
  else{const name=document.getElementById('an').value.trim();const{error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});if(error){showMsg(error.message,'err');btn.textContent='Criar conta';btn.disabled=false;}else showMsg('Conta criada! Verifique seu e-mail.','ok');}
}
async function logout(){await sb.auth.signOut();location.reload();}

sb.auth.onAuthStateChange(async(_,session)=>{
  if(session){
    USER=session.user;
    const av=USER.user_metadata?.name?USER.user_metadata.name[0].toUpperCase():USER.email[0].toUpperCase();
    document.getElementById('uav').textContent=av;
    document.getElementById('ue').textContent=USER.email;
    document.getElementById('mm').textContent=ml(MA);
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').classList.add('visible');
    await Promise.all([loadData(),loadProcs()]);
    render();
  }
  hideLoading();
});
function hideLoading(){const l=document.getElementById('loading');l.classList.add('hidden');setTimeout(()=>l.remove(),400);}

// Helpers
const mk=x=>`${x.y}-${String(x.m+1).padStart(2,'0')}`;
const ml=x=>`${MN[x.m]}/${x.y}`;
const nxt=x=>x.m===11?{y:x.y+1,m:0}:{y:x.y,m:x.m+1};
const prv=x=>x.m===0?{y:x.y-1,m:11}:{y:x.y,m:x.m-1};
const soma=a=>(a||[]).reduce((s,x)=>s+(parseFloat(x.valor)||0),0);
const fmt=v=>'R$ '+Math.round(v).toLocaleString('pt-BR');
const fd=v=>(parseFloat(v)||0).toFixed(2);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const fd2=s=>{if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;};
const diffD=s=>{if(!s)return null;return Math.ceil((new Date(s+'T12:00:00')-hoje)/(86400000));};
const trash=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>`;
const editIc=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;

// Finance data
async function loadData(){
  if(!USER)return;
  const{data}=await sb.from('meses').select('dados').eq('user_id',USER.id).eq('mes',mk(MA)).single();
  D=data?.dados?{...{fixas:[],variaveis:[],parcelas:[],receitas:[],areceber:[]},...data.dados}:{fixas:[],variaveis:[],parcelas:[],receitas:[],areceber:[]};
}
async function salvarMes(){
  if(saving)return;saving=true;
  const fab=document.getElementById('fab');fab.innerHTML='<span class="spin"></span> Salvando...';fab.disabled=true;
  const{error}=await sb.from('meses').upsert({user_id:USER.id,mes:mk(MA),dados:D},{onConflict:'user_id,mes'});
  fab.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Salvo!`;
  fab.style.background=error?'var(--red)':'#1D9E75';
  setTimeout(()=>{setFab();fab.disabled=false;saving=false;},2000);
}
async function mudaMes(d){MA=d>0?nxt(MA):prv(MA);document.getElementById('mm').textContent=ml(MA);await loadData();render();}

// Processos data
async function loadProcs(){
  if(!USER)return;
  const{data}=await sb.from('processos').select('*').eq('user_id',USER.id).order('created_at',{ascending:false});
  PROCS=data||[];
}
async function salvarProcesso(){
  const numero=document.getElementById('pn').value.trim();
  if(!numero){alert('Número do processo é obrigatório.');return;}
  const proc={user_id:USER.id,numero,titulo:document.getElementById('pti').value.trim(),tipo:document.getElementById('pt').value.trim(),parte:document.getElementById('ppa').value.trim(),advogado:document.getElementById('padv').value.trim(),status:document.getElementById('pst').value,fase:document.getElementById('pfa').value,portal:document.getElementById('ppo').value.trim(),login_acesso:document.getElementById('plo').value.trim(),senha_acesso:document.getElementById('pse').value,ultima_notif_data:document.getElementById('pun').value||null,proxima_data:document.getElementById('ppr').value||null,valor:parseFloat(document.getElementById('pva').value)||null,ultima_movimentacao:document.getElementById('pmo').value.trim(),observacoes:document.getElementById('pob').value.trim()};
  let error;
  if(editId){({error}=await sb.from('processos').update(proc).eq('id',editId));}
  else{({error}=await sb.from('processos').insert(proc));}
  if(error){alert('Erro: '+error.message);return;}
  closeModal();await loadProcs();render();
}
async function deleteProc(id){if(!confirm('Excluir este processo?'))return;await sb.from('processos').delete().eq('id',id);await loadProcs();render();}

// Modal
function openModal(p=null){
  editId=p?p.id:null;
  document.getElementById('mtitle').textContent=p?'Editar processo':'Novo processo';
  const f={'pn':p?.numero||'','pti':p?.titulo||'','pt':p?.tipo||'','ppa':p?.parte||'','padv':p?.advogado||'','pst':p?.status||'Em andamento','pfa':p?.fase||'Inicial / Citação','ppo':p?.portal||'','plo':p?.login_acesso||'','pse':p?.senha_acesso||'','pun':p?.ultima_notif_data||'','ppr':p?.proxima_data||'','pva':p?.valor||'','pmo':p?.ultima_movimentacao||'','pob':p?.observacoes||''};
  Object.entries(f).forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.value=v;});
  document.getElementById('mproc').style.display='flex';
}
function closeModal(){document.getElementById('mproc').style.display='none';editId=null;}
function togglePass(){const i=document.getElementById('pse');i.type=i.type==='password'?'text':'password';}

// FAB
function setFab(){
  const fab=document.getElementById('fab'),lbl=document.getElementById('flbl');
  fab.style.background='';fab.disabled=false;
  if(CP==='processos'){fab.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Novo processo';}
  else{fab.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salvar mês';}
}
function fabAction(){CP==='processos'?openModal():salvarMes();}

// Nav
function navTo(p){CP=p;document.querySelectorAll('.ni[data-p]').forEach(el=>el.classList.toggle('on',el.dataset.p===p));setFab();render();}
function openDrawer(){document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');}

function render(){
  ['resumo','receitas','fixas','variaveis','parcelas','processos'].forEach(p=>document.getElementById('pg-'+p).style.display=p===CP?'block':'none');
  if(CP==='resumo')rResumo();else if(CP==='receitas')rReceitas();else if(CP==='fixas')rFixas();else if(CP==='variaveis')rVariaveis();else if(CP==='parcelas')rParcelas();else if(CP==='processos')rProcessos();
}

function hdr(t,s,mon=true){return`<div class="ph"><div><div class="pt">${t}</div><div class="ps">${s}</div></div>${mon?`<div class="mnav"><button onclick="mudaMes(-1)">&#8592;</button><span class="mlbl">${ml(MA)}</span><button onclick="mudaMes(1)">&#8594;</button></div>`:''}</div>`;}
function catSel(v){return CATS.map(c=>`<option${c===v?' selected':''}>${c}</option>`).join('');}
function tSel(v){return TREC.map(c=>`<option${c===v?' selected':''}>${c}</option>`).join('');}

// Resumo
function rResumo(){
  const rec=soma(D.receitas),fix=soma(D.fixas),vari=soma(D.variaveis),parc=soma(D.parcelas),total=fix+vari+parc,saldo=rec-total,pct=rec>0?Math.min(100,Math.round(total/rec*100)):0;
  const cm={};[...D.fixas,...D.variaveis].forEach(x=>{const c=x.cat||'Outros';cm[c]=(cm[c]||0)+(parseFloat(x.valor)||0);});D.parcelas.forEach(x=>{cm['Cartões']=(cm['Cartões']||0)+(parseFloat(x.valor)||0);});
  const sc=Object.entries(cm).sort((a,b)=>b[1]-a[1]),mx=sc[0]?sc[0][1]:1;
  const venc=[...D.fixas,...D.variaveis].filter(x=>x.venc).sort((a,b)=>a.venc-b.venc),dh=hoje.getDate();
  const pa=D.parcelas.filter(p=>{const c=parseInt((p.parcAtual||'').split('/')[0])||0,t=parseInt((p.parcAtual||'').split('/')[1])||p.parcTotal||0;return t>0&&(t-c)<=2&&(t-c)>=0;});
  const urg=PROCS.filter(p=>{const d=diffD(p.proxima_data);return d!==null&&d>=0&&d<=7;});
  document.getElementById('pg-resumo').innerHTML=hdr('Resumo',ml(MA))+
  (urg.length?`<div class="alert-r">⚖️ <strong>${urg.length} processo${urg.length>1?'s':''} com prazo urgente:</strong> ${urg.map(p=>`${(p.numero||'').substring(0,18)}… (${fd2(p.proxima_data)})`).join(' · ')}</div>`:'')+
  `<div class="mets">
    <div class="met"><div class="ml">Receita</div><div class="mv" style="color:var(--green)">${fmt(rec)}</div><div class="ms">${D.receitas.length} fonte${D.receitas.length!==1?'s':''}</div></div>
    <div class="met"><div class="ml">Gastos</div><div class="mv" style="color:var(--red)">${fmt(total)}</div><div class="ms">${pct}% da receita</div></div>
    <div class="met"><div class="ml">Saldo</div><div class="mv" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(saldo)}</div><div class="ms">${saldo>=0?'sobra':'falta'} no mês</div></div>
    <div class="met"><div class="ml">Processos ativos</div><div class="mv" style="color:var(--purple)">${PROCS.filter(p=>!p.status?.startsWith('Encerrado')).length}</div><div class="ms">de ${PROCS.length} total</div></div>
  </div>
  <div class="g2" style="margin-bottom:1rem">
    <div class="card"><div class="ct">Por categoria</div>${sc.length===0?'<p style="font-size:13px;color:var(--muted)">Nenhum gasto ainda.</p>':sc.map(([c,v])=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:var(--muted)">${c}</span><span style="font-weight:500">${fmt(v)}</span></div><div class="prog"><div class="pf" style="width:${Math.round(v/mx*100)}%;background:${CC[c]||'#888'}"></div></div></div>`).join('')}</div>
    <div class="card"><div class="ct">Detalhe</div><table class="tbl"><tr><th>Tipo</th><th class="num">Valor</th><th class="num">%</th></tr><tr><td>Fixas</td><td class="num">${fmt(fix)}</td><td class="num">${total>0?Math.round(fix/total*100):0}%</td></tr><tr><td>Variáveis</td><td class="num">${fmt(vari)}</td><td class="num">${total>0?Math.round(vari/total*100):0}%</td></tr><tr><td>Parcelas</td><td class="num">${fmt(parc)}</td><td class="num">${total>0?Math.round(parc/total*100):0}%</td></tr><tr style="font-weight:500"><td>Total</td><td class="num">${fmt(total)}</td><td class="num">100%</td></tr></table></div>
  </div>
  ${pa.length?`<div class="alert-a">Parcela${pa.length>1?'s':''} acabando: ${pa.map(p=>p.desc+' ('+p.parcAtual+')').join(', ')}</div>`:''}
  <div class="card"><div class="ct">Vencimentos do mês</div>${venc.length===0?'<p style="font-size:13px;color:var(--muted)">Nenhum cadastrado.</p>':`<div class="vlist">${venc.map(x=>{const u=x.venc>=dh&&x.venc<=dh+5;return`<div class="vchip${u?' urg':''}"><div class="vd">Dia ${x.venc}</div><div class="vn">${esc(x.desc)}</div><div class="vv">${fmt(x.valor)}</div></div>`;}).join('')}</div>`}</div>
  ${D.areceber.filter(x=>x.desc||x.valor).length?`<div class="card"><div class="ct">A receber <span class="badge bb">${fmt(soma(D.areceber))}</span></div><table class="tbl"><tr><th>Descrição</th><th>Tipo</th><th class="num">Valor</th></tr>${D.areceber.filter(x=>x.desc||x.valor).map(x=>`<tr><td>${esc(x.desc)||'—'}</td><td><span class="badge bgr">${x.tipo||'Outros'}</span></td><td class="num" style="color:var(--green)">${fmt(x.valor)}</td></tr>`).join('')}</table></div>`:''}`;
}

// Processos
function rProcessos(){
  const ativos=PROCS.filter(p=>!p.status?.startsWith('Encerrado'));
  const urg=PROCS.filter(p=>{const d=diffD(p.proxima_data);return d!==null&&d>=0&&d<=7;});
  const enc=PROCS.filter(p=>p.status?.startsWith('Encerrado'));
  const totalVal=PROCS.filter(p=>p.valor).reduce((s,p)=>s+(p.valor||0),0);

  document.getElementById('pg-processos').innerHTML=hdr('Processos','Monitoramento jurídico',false)+`
  <div class="mets">
    <div class="met"><div class="ml">Processos ativos</div><div class="mv" style="color:var(--purple)">${ativos.length}</div><div class="ms">de ${PROCS.length} total</div></div>
    <div class="met"><div class="ml">Prazos urgentes</div><div class="mv" style="color:${urg.length>0?'var(--red)':'var(--green)'}">${urg.length}</div><div class="ms">próximos 7 dias</div></div>
    <div class="met"><div class="ml">Encerrados</div><div class="mv">${enc.length}</div><div class="ms">${enc.filter(p=>p.status==='Encerrado — favorável').length} favoráveis</div></div>
    <div class="met"><div class="ml">Valor total</div><div class="mv" style="font-size:${totalVal>0?'18px':'26px'}">${totalVal>0?fmt(totalVal):'—'}</div><div class="ms">envolvido</div></div>
  </div>
  ${urg.length?`<div class="alert-r" style="margin-bottom:1rem">⚠️ <strong>Prazos urgentes:</strong> ${urg.map(p=>`<strong>${(p.numero||'').substring(0,20)}</strong> — ${fd2(p.proxima_data)}`).join(' · ')}</div>`:''}
  ${PROCS.length===0?`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Nenhum processo cadastrado ainda.</p><button class="btn btn-primary" style="margin-top:1rem" onclick="openModal()">+ Adicionar primeiro processo</button></div>`:
  `<div class="proc-grid">${PROCS.map(p=>{
    const d=diffD(p.proxima_data);
    const cls=d!==null&&d>=0&&d<=7?'urgente':d!==null&&d>=0&&d<=30?'atencao':p.status?.startsWith('Encerrado')?'encerrado':'';
    const pb=d===null?'':d<0?`<span class="badge br">Prazo vencido</span>`:d===0?`<span class="badge br">Prazo hoje</span>`:d<=7?`<span class="badge br">Em ${d}d</span>`:d<=30?`<span class="badge ba">Em ${d}d</span>`:`<span class="badge bgr">Em ${d}d</span>`;
    return`<div class="proc-card ${cls}">
      <div class="proc-header">
        <div class="proc-num">${esc(p.numero)||'—'}</div>
        <div class="proc-actions">
          <button class="btn-ghost" onclick="openModal(PROCS.find(x=>x.id==='${p.id}'))" title="Editar">${editIc}</button>
          <button class="btn-ghost" onclick="deleteProc('${p.id}')" title="Excluir">${trash}</button>
        </div>
      </div>
      ${p.titulo?`<div class="proc-titulo">${esc(p.titulo)}</div>`:''}
      <div class="proc-meta">
        <span class="badge ${SBM[p.status]||'bgr'}">${p.status||'—'}</span>
        ${p.fase?`<span class="badge bp">${esc(p.fase)}</span>`:''}
        ${pb}
      </div>
      <div class="proc-info">
        ${p.tipo?`<div class="pf-item"><span class="lbl">Tipo / Vara</span><span class="val">${esc(p.tipo)}</span></div>`:''}
        ${p.parte?`<div class="pf-item"><span class="lbl">Parte contrária</span><span class="val">${esc(p.parte)}</span></div>`:''}
        ${p.advogado?`<div class="pf-item"><span class="lbl">Advogado</span><span class="val">${esc(p.advogado)}</span></div>`:''}
        ${p.valor?`<div class="pf-item"><span class="lbl">Valor</span><span class="val">${fmt(p.valor)}</span></div>`:''}
        ${p.ultima_notif_data?`<div class="pf-item"><span class="lbl">Última notificação</span><span class="val">${fd2(p.ultima_notif_data)}</span></div>`:''}
        ${p.proxima_data?`<div class="pf-item"><span class="lbl">Próximo prazo</span><span class="val">${fd2(p.proxima_data)}</span></div>`:''}
        ${p.portal?`<div class="pf-item" style="grid-column:1/-1"><span class="lbl">Portal</span><span class="val"><a href="${esc(p.portal)}" target="_blank" style="color:var(--accent)">${esc(p.portal)}</a></span></div>`:''}
        ${p.login_acesso?`<div class="pf-item"><span class="lbl">Login</span><span class="val">${esc(p.login_acesso)}</span></div>`:''}
        ${p.senha_acesso?`<div class="pf-item"><span class="lbl">Senha</span><span class="val"><span id="sv${p.id}" style="filter:blur(4px);cursor:pointer;font-family:'DM Mono',monospace" onclick="revS('${p.id}','${esc(p.senha_acesso)}')" title="Clique para revelar">••••••••</span></span></div>`:''}
      </div>
      ${p.ultima_movimentacao?`<div class="proc-notif"><div class="notif-lbl">Última movimentação</div><div class="notif-txt">${esc(p.ultima_movimentacao)}</div></div>`:''}
      ${p.observacoes?`<div class="proc-obs">${esc(p.observacoes)}</div>`:''}
    </div>`;
  }).join('')}</div>`}`;
}

function revS(id,s){const el=document.getElementById('sv'+id);if(el.style.filter){el.style.filter='';el.textContent=s;el.title='Clique para ocultar';}else{el.style.filter='blur(4px)';el.textContent='••••••••';el.title='Clique para revelar';}}

// Finance pages
function rReceitas(){
  document.getElementById('pg-receitas').innerHTML=hdr('Receitas','Tudo que entra no mês')+`
  <div class="card"><div class="ct">Confirmadas <span class="badge bg">${fmt(soma(D.receitas))}</span></div><div class="fhead fh-rec"><span>Descrição</span><span>Valor (R$)</span><span class="htipo">Tipo</span><span></span></div><div id="lr"></div><button class="btn" onclick="addR('receitas')" style="margin-top:10px">+ Adicionar</button></div>
  <div class="card"><div class="ct">A receber <span class="badge bb">${fmt(soma(D.areceber))}</span></div><p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Valores esperados, ainda não confirmados.</p><div class="fhead fh-rec"><span>Descrição</span><span>Valor (R$)</span><span class="htipo">Tipo</span><span></span></div><div id="lar"></div><button class="btn" onclick="addR('areceber')" style="margin-top:10px">+ Adicionar</button></div>`;
  rlR('receitas','lr');rlR('areceber','lar');
}
function rlR(t,id){const el=document.getElementById(id);if(!el)return;el.innerHTML=D[t].map((x,i)=>`<div class="frow-rec" style="margin-bottom:4px"><input type="text" value="${esc(x.desc)}" placeholder="Descrição" oninput="D['${t}'][${i}].desc=this.value"><input type="number" value="${fd(x.valor)}" placeholder="0,00" oninput="D['${t}'][${i}].valor=parseFloat(this.value)||0"><select class="htipo" onchange="D['${t}'][${i}].tipo=this.value">${tSel(x.tipo||'Salário')}</select><button class="btn-ghost" onclick="del('${t}',${i})">${trash}</button></div>`).join('');}
function addR(t){D[t].push({desc:'',valor:0,tipo:'Salário'});rlR(t,t==='receitas'?'lr':'lar');}

function rFixas(){document.getElementById('pg-fixas').innerHTML=hdr('Contas fixas','Chegam todo mês')+`<div class="card"><div class="ct">Fixas <span class="badge bgr">${fmt(soma(D.fixas))}</span></div><div class="fhead fh-fix"><span>Descrição</span><span>Valor (R$)</span><span class="hcat">Categoria</span><span class="hvenc">Venc.</span><span></span></div><div id="lf"></div><button class="btn" onclick="addF()" style="margin-top:10px">+ Adicionar</button></div>`;rlF();}
function rlF(){const el=document.getElementById('lf');if(!el)return;el.innerHTML=D.fixas.map((x,i)=>`<div class="frow-fix" style="margin-bottom:4px"><input type="text" value="${esc(x.desc)}" placeholder="Ex: Aluguel" oninput="D.fixas[${i}].desc=this.value"><input type="number" value="${fd(x.valor)}" placeholder="0,00" oninput="D.fixas[${i}].valor=parseFloat(this.value)||0"><select class="hcat" onchange="D.fixas[${i}].cat=this.value">${catSel(x.cat||'Moradia')}</select><input type="number" class="hvenc" value="${x.venc||''}" placeholder="Dia" min="1" max="31" oninput="D.fixas[${i}].venc=parseInt(this.value)||null"><button class="btn-ghost" onclick="del('fixas',${i})">${trash}</button></div>`).join('');}
function addF(){D.fixas.push({desc:'',valor:0,cat:'Moradia',venc:null});rlF();}

function rVariaveis(){document.getElementById('pg-variaveis').innerHTML=hdr('Variáveis','Gastos que mudam todo mês')+`<div class="card"><div class="ct">Variáveis <span class="badge bgr">${fmt(soma(D.variaveis))}</span></div><div class="fhead fh-fix"><span>Descrição</span><span>Valor (R$)</span><span class="hcat">Categoria</span><span class="hvenc">Venc.</span><span></span></div><div id="lv"></div><button class="btn" onclick="addV()" style="margin-top:10px">+ Adicionar</button></div>`;rlV();}
function rlV(){const el=document.getElementById('lv');if(!el)return;el.innerHTML=D.variaveis.map((x,i)=>`<div class="frow-fix" style="margin-bottom:4px"><input type="text" value="${esc(x.desc)}" placeholder="Ex: Supermercado" oninput="D.variaveis[${i}].desc=this.value"><input type="number" value="${fd(x.valor)}" placeholder="0,00" oninput="D.variaveis[${i}].valor=parseFloat(this.value)||0"><select class="hcat" onchange="D.variaveis[${i}].cat=this.value">${catSel(x.cat||'Alimentação')}</select><input type="number" class="hvenc" value="${x.venc||''}" placeholder="Dia" min="1" max="31" oninput="D.variaveis[${i}].venc=parseInt(this.value)||null"><button class="btn-ghost" onclick="del('variaveis',${i})">${trash}</button></div>`).join('');}
function addV(){D.variaveis.push({desc:'',valor:0,cat:'Alimentação',venc:null});rlV();}

function rParcelas(){document.getElementById('pg-parcelas').innerHTML=hdr('Parcelas','Cartões e financiamentos')+`<div class="card"><div class="ct">Parcelas ativas <span class="badge bgr">${fmt(soma(D.parcelas))}</span></div><div class="fhead fh-parc"><span>Descrição</span><span>Valor/mês</span><span class="hpn">Parcela</span><span class="hpt">Total parc.</span><span></span></div><div id="lp"></div><button class="btn" onclick="addP()" style="margin-top:10px">+ Adicionar</button></div>`;rlP();}
function rlP(){const el=document.getElementById('lp');if(!el)return;el.innerHTML=D.parcelas.map((x,i)=>`<div class="frow-parc" style="margin-bottom:4px"><input type="text" value="${esc(x.desc)}" placeholder="Ex: Cartão Santander" oninput="D.parcelas[${i}].desc=this.value"><input type="number" value="${fd(x.valor)}" placeholder="0,00" oninput="D.parcelas[${i}].valor=parseFloat(this.value)||0"><input type="text" class="hpn" value="${x.parcAtual||''}" placeholder="3/12" oninput="D.parcelas[${i}].parcAtual=this.value"><input type="number" class="hpt" value="${x.parcTotal||''}" placeholder="12" oninput="D.parcelas[${i}].parcTotal=parseInt(this.value)||0"><button class="btn-ghost" onclick="del('parcelas',${i})">${trash}</button></div>`).join('');}
function addP(){D.parcelas.push({desc:'',valor:0,parcAtual:'',parcTotal:0});rlP();}

function del(t,i){D[t].splice(i,1);render();}
</script>
